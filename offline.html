<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Offline — ProjectCheck</title>
	<style>
		:root {
			--color-primary: #0082c9;
			--color-primary-hover: #006aa3;
			--color-background: #ffffff;
			--color-main-text: #222222;
			--color-text-maxcontrast: #555555;
			--color-warning: #c98600;
			--color-error: #e9322d;
			--color-success: #27ae60;
			--font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			--pc-space-3: 0.75rem;
			--pc-space-4: 1rem;
			--pc-space-5: 1.25rem;
			--pc-space-6: 1.5rem;
		}

		* { box-sizing: border-box; }

		html {
			font-size: 16px;
			line-height: 1.5;
		}

		body {
			font-family: var(--font-family);
			color: var(--color-main-text);
			background: var(--color-background);
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: var(--pc-space-4);
			-webkit-font-smoothing: antialiased;
		}

		.projectcheck-status-page {
			max-width: 32rem;
			width: 100%;
			text-align: center;
			padding: var(--pc-space-6);
		}

		.projectcheck-status-page__icon {
			display: flex;
			justify-content: center;
			margin-bottom: var(--pc-space-4);
			color: var(--color-warning);
			font-size: 2.75rem;
			line-height: 1;
		}

		.projectcheck-status-page__title {
			margin: 0 0 var(--pc-space-3);
			font-size: 1.25rem;
			font-weight: 600;
		}

		.projectcheck-status-page__message {
			margin: 0 0 var(--pc-space-5);
			color: var(--color-text-maxcontrast);
		}

		.projectcheck-status-page__actions {
			display: flex;
			flex-wrap: wrap;
			gap: var(--pc-space-3);
			justify-content: center;
		}

		.btn {
			display: inline-block;
			padding: 0.75rem 1.25rem;
			font-size: 0.9375rem;
			font-weight: 500;
			border: 1px solid transparent;
			border-radius: 4px;
			cursor: pointer;
			background: var(--color-primary);
			color: #fff;
			text-decoration: none;
		}

		.btn:hover { background: var(--color-primary-hover); }

		.btn:focus-visible {
			outline: 3px solid #005fcc;
			outline-offset: 2px;
		}

		.btn--secondary {
			background: transparent;
			color: var(--color-primary);
			border-color: var(--color-primary);
		}

		.btn--secondary:hover {
			background: var(--color-primary);
			color: #fff;
		}

		.offline-status {
			margin-top: var(--pc-space-5);
			padding: var(--pc-space-4);
			background: #f4f6f8;
			border-radius: 4px;
			font-size: 0.875rem;
			color: var(--color-text-maxcontrast);
		}

		.status-indicator {
			display: inline-block;
			width: 0.5rem;
			height: 0.5rem;
			border-radius: 50%;
			background: var(--color-error);
			margin-right: 0.5rem;
			vertical-align: middle;
		}

		.status-indicator--online { background: var(--color-success); }

		@media (prefers-color-scheme: dark) {
			:root {
				--color-background: #1a1a1a;
				--color-main-text: #ffffff;
				--color-text-maxcontrast: #cccccc;
			}
			.offline-status { background: #2a2a2a; }
		}

		@media (max-width: 480px) {
			.projectcheck-status-page { padding: var(--pc-space-4); }
			.projectcheck-status-page__actions { flex-direction: column; }
			.btn { width: 100%; }
		}
	</style>
</head>
<body>
	<main class="projectcheck-status-page" role="main" aria-labelledby="offline-heading">
		<div class="projectcheck-status-page__icon" aria-hidden="true">📶</div>
		<h1 class="projectcheck-status-page__title" id="offline-heading">You’re offline</h1>
		<p class="projectcheck-status-page__message">
			There is no internet connection right now. ProjectCheck needs a connection for most features.
			When you are back online, use <strong>Try again</strong> to reload.
		</p>
		<div class="projectcheck-status-page__actions">
			<button type="button" class="btn" id="btn-reload">Try again</button>
			<button type="button" class="btn btn--secondary" id="btn-check">Check connection</button>
		</div>
		<div class="offline-status" role="status" aria-live="polite">
			<span class="status-indicator" id="statusIndicator" aria-hidden="true"></span>
			<span id="statusText">Checking connection…</span>
		</div>
	</main>
	<script>
		(function () {
			'use strict';

			var statusIndicator = document.getElementById('statusIndicator');
			var statusText = document.getElementById('statusText');

			function instanceRoot() {
				var path = self.location.pathname || '';
				var marker = '/apps/projectcheck/';
				var idx = path.indexOf(marker);
				if (idx === -1) {
					return '';
				}
				return path.substring(0, idx);
			}

			function connectivityProbeUrl() {
				return instanceRoot() + '/index.php/core/img/favicon/favicon.ico';
			}

			function setOfflineStatus(message) {
				statusIndicator.className = 'status-indicator';
				statusText.textContent = message;
			}

			function setOnlineStatus(message) {
				statusIndicator.className = 'status-indicator status-indicator--online';
				statusText.textContent = message;
			}

			function probeConnection() {
				setOfflineStatus('Checking connection…');
				return fetch(connectivityProbeUrl(), {
					method: 'HEAD',
					cache: 'no-cache',
					credentials: 'same-origin'
				});
			}

			function checkConnection() {
				probeConnection()
					.then(function () {
						setOnlineStatus('Connection restored. Reloading…');
						setTimeout(function () { window.location.reload(); }, 800);
					})
					.catch(function () {
						setOfflineStatus('Still offline. Check your network, then try again.');
					});
			}

			function onOnline() {
				checkConnection();
			}

			function onOffline() {
				setOfflineStatus('You are still offline.');
			}

			document.getElementById('btn-reload').addEventListener('click', function () {
				window.location.reload();
			});
			document.getElementById('btn-check').addEventListener('click', checkConnection);
			window.addEventListener('online', onOnline);
			window.addEventListener('offline', onOffline);

			if (navigator.onLine) {
				setOnlineStatus('Browser reports online. If the app does not load, use Try again.');
			} else {
				onOffline();
			}
		})();
	</script>
</body>
</html>
