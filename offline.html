<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title data-i18n="Offline — ProjectCheck">Offline — ProjectCheck</title>
	<style>
		:root {
			--color-primary: #0082c9;
			--color-primary-hover: #006aa3;
			--color-background: #ffffff;
			--color-main-text: #222222;
			--color-text-maxcontrast: #555555;
			--color-warning: #c98600;
			--color-error: #e9322d;
			--color-success: #27ae60;
			--font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			--pc-space-3: 0.75rem;
			--pc-space-4: 1rem;
			--pc-space-5: 1.25rem;
			--pc-space-6: 1.5rem;
		}

		* { box-sizing: border-box; }

		html {
			font-size: 16px;
			line-height: 1.5;
		}

		body {
			font-family: var(--font-family);
			color: var(--color-main-text);
			background: var(--color-background);
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: var(--pc-space-4);
			-webkit-font-smoothing: antialiased;
		}

		.projectcheck-status-page {
			max-width: 32rem;
			width: 100%;
			text-align: center;
			padding: var(--pc-space-6);
		}

		.projectcheck-status-page__icon {
			display: flex;
			justify-content: center;
			margin-bottom: var(--pc-space-4);
			color: var(--color-warning);
			font-size: 2.75rem;
			line-height: 1;
		}

		.projectcheck-status-page__title {
			margin: 0 0 var(--pc-space-3);
			font-size: 1.25rem;
			font-weight: 600;
		}

		.projectcheck-status-page__message {
			margin: 0 0 var(--pc-space-5);
			color: var(--color-text-maxcontrast);
		}

		.projectcheck-status-page__actions {
			display: flex;
			flex-wrap: wrap;
			gap: var(--pc-space-3);
			justify-content: center;
		}

		.btn {
			display: inline-block;
			padding: 0.75rem 1.25rem;
			font-size: 0.9375rem;
			font-weight: 500;
			border: 1px solid transparent;
			border-radius: 4px;
			cursor: pointer;
			background: var(--color-primary);
			color: #fff;
			text-decoration: none;
		}

		.btn:hover { background: var(--color-primary-hover); }

		.btn:focus-visible {
			outline: 3px solid #005fcc;
			outline-offset: 2px;
		}

		.btn--secondary {
			background: transparent;
			color: var(--color-primary);
			border-color: var(--color-primary);
		}

		.btn--secondary:hover {
			background: var(--color-primary);
			color: #fff;
		}

		.offline-status {
			margin-top: var(--pc-space-5);
			padding: var(--pc-space-4);
			background: #f4f6f8;
			border-radius: 4px;
			font-size: 0.875rem;
			color: var(--color-text-maxcontrast);
		}

		.status-indicator {
			display: inline-block;
			width: 0.5rem;
			height: 0.5rem;
			border-radius: 50%;
			background: var(--color-error);
			margin-right: 0.5rem;
			vertical-align: middle;
		}

		.status-indicator--online { background: var(--color-success); }

		@media (prefers-color-scheme: dark) {
			:root {
				--color-background: #1a1a1a;
				--color-main-text: #ffffff;
				--color-text-maxcontrast: #cccccc;
			}
			.offline-status { background: #2a2a2a; }
		}

		@media (max-width: 480px) {
			.projectcheck-status-page { padding: var(--pc-space-4); }
			.projectcheck-status-page__actions { flex-direction: column; }
			.btn { width: 100%; }
		}
	</style>
</head>
<body>
	<main class="projectcheck-status-page" role="main" aria-labelledby="offline-heading">
		<div class="projectcheck-status-page__icon" aria-hidden="true">📶</div>
		<h1 class="projectcheck-status-page__title" id="offline-heading" data-i18n="You’re offline">You’re offline</h1>
		<p class="projectcheck-status-page__message" id="offline-message" data-i18n="There is no internet connection right now. ProjectCheck needs a connection for most features. When you are back online, use Try again to reload.">
			There is no internet connection right now. ProjectCheck needs a connection for most features.
			When you are back online, use <strong>Try again</strong> to reload.
		</p>
		<div class="projectcheck-status-page__actions">
			<button type="button" class="btn" id="btn-reload" data-i18n="Try again">Try again</button>
			<button type="button" class="btn btn--secondary" id="btn-check" data-i18n="Check connection">Check connection</button>
		</div>
		<div class="offline-status" role="status" aria-live="polite">
			<span class="status-indicator" id="statusIndicator" aria-hidden="true"></span>
			<span id="statusText" data-i18n="Checking connection…">Checking connection…</span>
		</div>
	</main>
	<script>
		(function () {
			'use strict';

			var PCID = 'projectcheck';
			/** @type {Record<string, string>} */
			var catalog = {};

			/**
			 * @param {string} appId
			 * @param {string} msgid
			 * @returns {string}
			 */
			function t(appId, msgid) {
				if (appId !== PCID) {
					return msgid;
				}
				return (catalog[msgid] !== undefined && catalog[msgid] !== '') ? catalog[msgid] : msgid;
			}

			var statusIndicator = document.getElementById('statusIndicator');
			var statusText = document.getElementById('statusText');

			function instanceRoot() {
				var path = self.location.pathname || '';
				var marker = '/apps/projectcheck/';
				var idx = path.indexOf(marker);
				if (idx === -1) {
					return '';
				}
				return path.substring(0, idx);
			}

			function l10nUrl(lang) {
				return instanceRoot() + '/apps/projectcheck/l10n/' + lang + '.json';
			}

			function resolveLang() {
				var raw = (navigator.language || 'en').toLowerCase().replace(/[^a-z0-9_-]/g, '');
				var candidates = [raw];
				if (raw.indexOf('-') !== -1) {
					candidates.push(raw.split('-')[0]);
				}
				if (raw.indexOf('_') !== -1) {
					candidates.push(raw.split('_')[0]);
				}
				candidates.push('en');
				var seen = {};
				return candidates.filter(function (c) {
					if (!c || seen[c]) {
						return false;
					}
					seen[c] = true;
					return true;
				});
			}

			function loadCatalog() {
				var langs = resolveLang();
				var chain = Promise.reject();
				langs.forEach(function (lang) {
					chain = chain.catch(function () {
						return fetch(l10nUrl(lang), { cache: 'force-cache' }).then(function (res) {
							if (!res.ok) {
								throw new Error('l10n ' + lang);
							}
							return res.json();
						});
					});
				});
				return chain.then(function (data) {
					catalog = (data && data.translations) ? data.translations : {};
				}).catch(function () {
					catalog = {};
				});
			}

			function applyStaticI18n() {
				document.querySelectorAll('[data-i18n]').forEach(function (el) {
					var key = el.getAttribute('data-i18n');
					if (!key) {
						return;
					}
					var text = t(PCID, key);
					if (el.id === 'offline-message') {
						var tryAgain = t(PCID, 'Try again');
						if (text.indexOf(tryAgain) !== -1) {
							el.innerHTML = text.replace(tryAgain, '<strong>' + tryAgain + '</strong>');
						} else {
							el.textContent = text;
						}
						return;
					}
					el.textContent = text;
				});
				var titleEl = document.querySelector('title[data-i18n]');
				if (titleEl) {
					document.title = t(PCID, titleEl.getAttribute('data-i18n') || document.title);
				}
			}

			function connectivityProbeUrl() {
				return instanceRoot() + '/index.php/core/img/favicon/favicon.ico';
			}

			function setOfflineStatus(message) {
				statusIndicator.className = 'status-indicator';
				statusText.textContent = message;
			}

			function setOnlineStatus(message) {
				statusIndicator.className = 'status-indicator status-indicator--online';
				statusText.textContent = message;
			}

			function probeConnection() {
				setOfflineStatus(t(PCID, 'Checking connection…'));
				return fetch(connectivityProbeUrl(), {
					method: 'HEAD',
					cache: 'no-cache',
					credentials: 'same-origin'
				});
			}

			function checkConnection() {
				probeConnection()
					.then(function () {
						setOnlineStatus(t(PCID, 'Connection restored. Reloading…'));
						setTimeout(function () { window.location.reload(); }, 800);
					})
					.catch(function () {
						setOfflineStatus(t(PCID, 'Still offline. Check your network, then try again.'));
					});
			}

			function onOnline() {
				checkConnection();
			}

			function onOffline() {
				setOfflineStatus(t(PCID, 'You are still offline.'));
			}

			document.getElementById('btn-reload').addEventListener('click', function () {
				window.location.reload();
			});
			document.getElementById('btn-check').addEventListener('click', checkConnection);
			window.addEventListener('online', onOnline);
			window.addEventListener('offline', onOffline);

			loadCatalog().then(function () {
				applyStaticI18n();
				if (navigator.onLine) {
					setOnlineStatus(t(PCID, 'Browser reports online. If the app does not load, use Try again.'));
				} else {
					onOffline();
				}
			});
		})();
	</script>
</body>
</html>
