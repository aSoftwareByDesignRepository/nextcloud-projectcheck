<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - ProjectControl</title>
    <style>
        :root {
            --color-primary: #0082c9;
            --color-primary-hover: #006aa3;
            --color-background: #ffffff;
            --color-text: #333333;
            --color-border: #e1e5e9;
            --color-error: #e74c3c;
            --color-warning: #f39c12;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html {
            font-size: 14px;
            line-height: 1.5;
        }

        body {
            font-family: var(--font-family);
            color: var(--color-text);
            background-color: var(--color-background);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }

        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background-color: var(--color-warning);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .offline-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--color-text);
        }

        .offline-message {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #666;
        }

        .offline-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: var(--color-primary);
            color: white;
        }

        .btn:hover {
            background-color: var(--color-primary-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--color-primary);
            border-color: var(--color-primary);
        }

        .btn-secondary:hover {
            background-color: var(--color-primary);
            color: white;
        }

        .offline-status {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 4px;
            font-size: 0.875rem;
            color: #666;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--color-error);
            margin-right: 0.5rem;
        }

        .status-indicator.online {
            background-color: #27ae60;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background: #1a1a1a;
                --color-text: #ffffff;
                --color-border: #404040;
            }

            .offline-status {
                background-color: #2a2a2a;
                color: #ccc;
            }
        }

        @media (max-width: 768px) {
            .offline-container {
                padding: 1rem;
            }

            .offline-title {
                font-size: 1.25rem;
            }

            .offline-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            📶
        </div>
        
        <h1 class="offline-title">You're Offline</h1>
        
        <p class="offline-message">
            It looks like you've lost your internet connection. Some features of ProjectControl may not be available while you're offline.
        </p>
        
        <div class="offline-actions">
            <button class="btn" onclick="window.location.reload()">
                Try Again
            </button>
            <button class="btn btn-secondary" onclick="checkConnection()">
                Check Connection
            </button>
        </div>
        
        <div class="offline-status">
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="statusText">Checking connection...</span>
        </div>
    </div>

    <script>
        // Check connection status
        function checkConnection() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            statusText.textContent = 'Checking connection...';
            statusIndicator.className = 'status-indicator';
            
            // Try to fetch a small resource to test connectivity
            fetch('/favicon.ico', { 
                method: 'HEAD',
                cache: 'no-cache'
            })
            .then(() => {
                statusIndicator.className = 'status-indicator online';
                statusText.textContent = 'Connection restored! Reloading...';
                
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            })
            .catch(() => {
                statusIndicator.className = 'status-indicator';
                statusText.textContent = 'Still offline. Please check your internet connection.';
            });
        }

        // Monitor connection status
        function updateConnectionStatus() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (navigator.onLine) {
                statusIndicator.className = 'status-indicator online';
                statusText.textContent = 'Connection restored! Reloading...';
                
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } else {
                statusIndicator.className = 'status-indicator';
                statusText.textContent = 'You are currently offline.';
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);

        // Initial status check
        updateConnectionStatus();

        // Periodic connection check
        setInterval(checkConnection, 30000); // Check every 30 seconds

        // Try to reload when connection is restored
        let reloadAttempts = 0;
        const maxReloadAttempts = 10;

        function attemptReload() {
            if (reloadAttempts >= maxReloadAttempts) {
                return;
            }

            reloadAttempts++;
            
            fetch('/favicon.ico', { 
                method: 'HEAD',
                cache: 'no-cache'
            })
            .then(() => {
                window.location.reload();
            })
            .catch(() => {
                // Try again in 5 seconds
                setTimeout(attemptReload, 5000);
            });
        }

        // Start attempting to reload after 10 seconds
        setTimeout(attemptReload, 10000);
    </script>
</body>
</html>
